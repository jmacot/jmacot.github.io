  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="420" cy="80" r="120" fill="rgba(255,255,255,0.04)"/>
  <circle cx="80" cy="440" r="100" fill="rgba(255,255,255,0.03)"/>
  <!-- Cross symbol (medical) -->
  <rect x="220" y="120" width="72" height="272" rx="16" fill="white" opacity="0.9"/>
  <rect x="156" y="220" width="200" height="72" rx="16" fill="white" opacity="0.9"/>
  <!-- Tools dots around cross -->
  <circle cx="156" cy="152" r="12" fill="#4caf7d" opacity="0.8"/>
  <circle cx="356" cy="152" r="12" fill="#7c3aed" opacity="0.8"/>
  <circle cx="156" cy="360" r="12" fill="#b45309" opacity="0.8"/>
  <circle cx="356" cy="360" r="12" fill="#0d7377" opacity="0.8"/>
  <!-- Label bar -->
  <rect x="156" y="424" width="200" height="28" rx="14" fill="rgba(255,255,255,0.12)"/>
